name: "Term Proposal"
description: "Propose a new term for the cartography"
title: "[Term] "
labels: ["term-proposal"]
body:
  - type: markdown
    attributes:
      value: |
        ## Propose a Term

        Thank you for contributing to the cartography. Please fill in all required fields below.

        **Important:** We study terms that emerge from lived practice in communities. AI-generated submissions are not accepted — not for quality reasons, but because the project studies words born of experience.

  - type: input
    id: term
    attributes:
      label: Term
      description: "The term you're proposing"
      placeholder: "e.g., vibe-coding"
    validations:
      required: true

  - type: input
    id: community
    attributes:
      label: Where does it come from?
      description: "Which community, practice, or context coined or uses this term?"
      placeholder: "e.g., ADHD community, degrowth movement, open-source developers, queer theory"
    validations:
      required: true

  - type: textarea
    id: makes_visible
    attributes:
      label: What does this term make visible?
      description: "What phenomenon does this term name that was previously unnamed or invisible?"
      placeholder: "Describe what couldn't be said — or thought clearly — before this term existed."
    validations:
      required: true

  - type: input
    id: pattern
    attributes:
      label: What kind of shift does it perform? (optional)
      description: "How does it change our thinking? There are no fixed categories — describe in your own words."
      placeholder: "e.g., makes invisible work visible, reframes a deficit as a difference, breaks a binary into a spectrum"
    validations:
      required: false

  - type: textarea
    id: citation
    attributes:
      label: Citation from actual usage
      description: "A concrete quote showing this term being used in practice, with source. Not paraphrased, not invented."
      placeholder: |
        "Quote from actual usage" — Source (URL, publication, conversation context)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context (optional)
      description: "When did this term emerge? What older term does it displace or complicate?"
      placeholder: "e.g., Emerged around 2024. Displaces 'laziness' framing. Related to..."
    validations:
      required: false
