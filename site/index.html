<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liminal Vocab: A Verbal Cartography of Liminal Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --paper-deep: #ebe4d6;
    --ink: #1a1a1a;
    --ink-soft: #5a5754;
    --ink-faded: #8a8680;
    --accent: #b8391a;
    --rule: #d9d2c2;
    --green: #2d6a4f;
  }

  [data-theme] { transition: background-color 0.3s ease, color 0.3s ease; }

  [data-theme="dark"] {
    --paper: #1a1a1e;
    --paper-deep: #232328;
    --ink: #e0ddd6;
    --ink-soft: #a8a4a0;
    --ink-faded: #706c68;
    --accent: #e05a3a;
    --rule: #333338;
    --green: #5aaa7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Newsreader", Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 380;
    font-size: 19px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--accent); color: var(--paper); }

  .wrap { max-width: 720px; margin: 0 auto; padding: 0 32px; }
  .wide { max-width: 960px; margin: 0 auto; padding: 0 32px; }

  /* ---- Top Nav Bar ---- */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 0 32px;
    display: flex;
    align-items: center;
    height: 52px;
    gap: 16px;
    transition: background-color 0.3s ease;
  }

  .top-bar-logo {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 48, "SOFT" 40;
    font-weight: 440;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
  }
  .top-bar-logo:hover { color: var(--accent); }

  .top-bar-nav {
    display: flex;
    gap: 4px;
    margin: 0 auto;
  }

  .nav-link {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 14px;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.25s ease;
    border-bottom: 2px solid transparent;
    border-radius: 0;
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

  .top-bar-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    white-space: nowrap;
  }

  .lang-switch {
    display: flex;
    gap: 4px;
  }

  .lang-switch button {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-faded);
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 2px;
  }
  .lang-switch button:hover { border-color: var(--ink); color: var(--ink); }
  .lang-switch button.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  .theme-toggle {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-faded);
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 2px;
  }
  .theme-toggle:hover { border-color: var(--ink); color: var(--ink); }

  /* ---- Hero ---- */
  header.hero {
    padding: 80px 0 70px;
    border-bottom: 1px solid var(--rule);
  }

  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 48px;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .eyebrow::before { content: ""; width: 32px; height: 1px; background: var(--ink-faded); }

  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-weight: 340;
    font-size: clamp(44px, 7vw, 88px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin-bottom: 56px;
  }
  h1 em {
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 80;
    color: var(--accent);
  }

  .lede {
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 580px;
    font-weight: 360;
  }

  /* ---- Sections ---- */
  section { padding: 110px 0; border-bottom: 1px solid var(--rule); }

  .section-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 40px;
  }

  h2 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 50;
    font-weight: 360;
    font-size: clamp(32px, 4vw, 44px);
    line-height: 1.1;
    letter-spacing: -0.015em;
    margin-bottom: 36px;
    max-width: 560px;
  }
  h2 em { font-style: italic; color: var(--accent); }

  p { margin-bottom: 22px; max-width: 620px; }
  p + p { margin-top: -4px; }

  .pull {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 60;
    font-style: italic;
    font-weight: 340;
    font-size: 26px;
    line-height: 1.35;
    color: var(--ink);
    padding: 32px 0 32px 28px;
    border-left: 2px solid var(--accent);
    margin: 48px 0;
    max-width: 600px;
  }
  .pull cite {
    display: block;
    margin-top: 16px;
    font-family: "JetBrains Mono", monospace;
    font-style: normal;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faded);
  }

  /* ---- View Toggle ---- */
  .view-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px dashed var(--rule);
  }

  .view-btn {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 2px;
  }
  .view-btn:hover { border-color: var(--ink); color: var(--ink); }
  .view-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* ---- Explorer / Cards ---- */
  .explorer-intro { margin-bottom: 56px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }

  .card {
    background: var(--paper);
    padding: 28px 26px 30px;
    transition: background 0.3s ease;
    cursor: default;
    display: flex;
    flex-direction: column;
    min-height: 220px;
  }
  .card:hover { background: var(--paper-deep); }

  .card-type {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 14px;
  }
  .card-type span { color: var(--accent); font-weight: 500; }

  .card-term {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }

  .card-makes-visible {
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: auto;
    padding-bottom: 18px;
  }

  .card-meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink-faded);
    padding-top: 14px;
    border-top: 1px dashed var(--rule);
  }

  .card-maturity {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-top: 8px;
  }

  .card-no-equiv {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--accent);
    margin-top: 6px;
    opacity: 0.7;
  }

  .card.hidden { display: none; }

  .explorer-note {
    margin-top: 36px;
    font-size: 14px;
    color: var(--ink-faded);
    font-style: italic;
    max-width: 580px;
  }

  /* ---- Graph View ---- */
  .graph-controls {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px;
  }
  .graph-legend { display: flex; flex-wrap: wrap; gap: 6px; }
  .graph-toggle {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 5px 10px; background: transparent;
    border: 1px solid var(--rule); color: var(--ink-faded);
    cursor: pointer; transition: all 0.2s ease; border-radius: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .graph-toggle:hover { border-color: var(--ink); color: var(--ink); }
  .graph-toggle.active { border-color: var(--ink-soft); color: var(--ink); }
  .graph-toggle:not(.active) { opacity: 0.4; }
  .legend-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
  }
  .legend-dot-dashed {
    background: none; border: 1.5px dashed var(--accent);
    width: 10px; height: 10px; border-radius: 50%;
  }
  .legend-dot-text {
    background: none; font-size: 9px; font-weight: 600;
    color: var(--ink-soft); width: auto; height: auto;
  }

  .graph-container {
    width: 100%;
    height: 600px;
    border: 1px solid var(--rule);
    background: var(--paper-deep);
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }
  .graph-container svg { width: 100%; height: 100%; display: block; }

  /* Fullscreen graph */
  #graphView.fullscreen {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000; background: var(--paper-deep);
    padding: 0; margin: 0; display: flex; flex-direction: column;
  }
  #graphView.fullscreen .graph-controls {
    padding: 12px 16px; background: var(--paper); border-bottom: 1px solid var(--rule);
    margin-bottom: 0; flex-shrink: 0;
  }
  #graphView.fullscreen .graph-container {
    height: auto; flex: 1; border: none; border-radius: 0;
  }

  .graph-tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 8px 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  .graph-tooltip.visible { opacity: 1; }
  .graph-tooltip-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-faded);
    margin-bottom: 2px;
  }

  /* ---- Wanted / Gaps ---- */
  .wanted-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .wanted-card {
    border: 2px dashed var(--rule);
    padding: 24px 22px;
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    min-height: 160px;
  }
  .wanted-card:hover { border-color: var(--ink-faded); }

  .wanted-term {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.1;
    margin-bottom: 12px;
    color: var(--accent);
    font-style: italic;
  }

  .wanted-desc {
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: auto;
    padding-bottom: 12px;
  }

  .wanted-tags {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink-faded);
  }

  @keyframes pulse-border {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ---- Method ---- */
  .method-steps { margin-top: 48px; display: grid; gap: 48px; max-width: 640px; }
  .step { display: grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: start; }
  .step-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    padding-top: 8px;
  }
  .step-body h3 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 48;
    font-weight: 420;
    font-size: 22px;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .step-body p { font-size: 17px; color: var(--ink-soft); margin-bottom: 0; }

  /* ---- Principles ---- */
  .principles { margin-top: 48px; display: grid; gap: 0; max-width: 640px; }
  .principle {
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 20px;
    align-items: baseline;
  }
  .principle:last-child { border-bottom: none; }
  .principle-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--ink-faded);
  }
  .principle-text {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 48, "SOFT" 40;
    font-weight: 380;
    font-size: 19px;
    line-height: 1.4;
  }
  .principle-text strong {
    font-weight: 520;
    font-style: italic;
    color: var(--accent);
  }

  /* ---- Forms ---- */
  .submit-intro { margin-bottom: 48px; }
  .submit-form { max-width: 640px; }
  .form-group { margin-bottom: 32px; }
  .form-group label {
    display: block;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .form-group label .required { color: var(--accent); }
  .form-group .hint {
    display: block;
    font-family: "Newsreader", Georgia, serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-faded);
    margin-bottom: 10px;
    text-transform: none;
    letter-spacing: normal;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 14px 16px;
    font-family: "Newsreader", Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    transition: border-color 0.25s ease;
    -webkit-appearance: none;
    appearance: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none;
    border-color: var(--ink);
  }
  .form-group textarea { min-height: 120px; resize: vertical; }

  .submit-btn {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 16px 40px;
    background: var(--ink);
    border: 1px solid var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 2px;
  }
  .submit-btn:hover { background: var(--accent); border-color: var(--accent); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-result {
    margin-top: 24px;
    padding: 20px 24px;
    border-radius: 2px;
    font-size: 16px;
    display: none;
  }
  .form-result.success {
    display: block;
    background: color-mix(in srgb, var(--green) 12%, var(--paper));
    border: 1px solid var(--green);
    color: var(--green);
  }
  .form-result.error {
    display: block;
    background: color-mix(in srgb, var(--accent) 12%, var(--paper));
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .form-result a { color: inherit; font-weight: 500; }

  .or-github {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px dashed var(--rule);
    font-size: 15px;
    color: var(--ink-faded);
  }
  .or-github a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: color 0.2s;
  }
  .or-github a:hover { color: var(--accent); }

  .form-section-divider {
    margin-top: 80px;
    padding-top: 60px;
    border-top: 1px dashed var(--rule);
  }

  /* ---- Footer ---- */
  footer { padding: 100px 0 80px; }
  footer p { font-size: 15px; color: var(--ink-soft); max-width: 560px; margin-bottom: 16px; }
  footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: color 0.2s;
  }
  footer a:hover { color: var(--accent); }
  .footer-meta {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--rule);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-faded);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* ---- Reveal animation ---- */
  .reveal {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* ---- Responsive ---- */
  @media (max-width: 640px) {
    .wrap, .wide { padding: 0 24px; }
    .top-bar { padding: 0 16px; height: 46px; gap: 8px; }
    .top-bar-logo { font-size: 14px; }
    .nav-link { font-size: 10px; padding: 6px 10px; }
    .lang-switch button { font-size: 10px; padding: 3px 7px; }
    .theme-toggle { font-size: 10px; padding: 3px 7px; }
    header.hero { padding: 60px 0 50px; }
    section { padding: 80px 0; }
    .grid { grid-template-columns: 1fr; }
    .wanted-grid { grid-template-columns: 1fr; }
    .step { grid-template-columns: 1fr; gap: 8px; }
    body { font-size: 17px; }
    .graph-container { height: 400px; }
  }
</style>
</head>
<body>

<!-- ======== TOP NAV BAR ======== -->
<nav class="top-bar">
  <a class="top-bar-logo" onclick="navigate('explore')">Liminal Vocab</a>
  <div class="top-bar-nav">
    <button class="nav-link active" data-page="explore" data-i18n="nav_explore" onclick="navigate('explore')">Explore</button>
    <button class="nav-link" data-page="about" data-i18n="nav_about" onclick="navigate('about')">About</button>
    <button class="nav-link" data-page="contribute" data-i18n="nav_contribute" onclick="navigate('contribute')">Contribute</button>
  </div>
  <div class="top-bar-controls">
    <div class="lang-switch">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="de">DE</button>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"></button>
  </div>
</nav>

<!-- ======== PAGE: EXPLORE ======== -->
<div id="page-explore">

  <header class="hero">
    <div class="wrap">
      <div class="eyebrow reveal"><span>Liminal Vocab &middot; April 2026</span></div>
      <h1 class="reveal" data-i18n="hero_title"></h1>
      <p class="lede reveal" data-i18n="hero_lede"></p>
    </div>
  </header>

  <section>
    <div class="wide">
      <div class="view-toggle reveal">
        <button class="view-btn active" id="viewCardsBtn" data-i18n="view_cards" onclick="switchView('cards')">Cards</button>
        <button class="view-btn" id="viewGraphBtn" data-i18n="view_graph" onclick="switchView('graph')">Graph</button>
      </div>

      <div id="cardsView">
        <div class="grid reveal" id="grid"></div>
      </div>

      <div id="graphView" style="display:none">
        <div class="graph-controls">
          <div class="graph-legend">

const LANG_NAMES = { en: 'englisches', de: 'deutsches' };
const MATURITY_KEYS = { seedling: 'maturity_seedling', growing: 'maturity_growing', established: 'maturity_established' };

let currentLang = localStorage.getItem('lv-lang') || 'en';

function t(key) { return UI[currentLang][key] || UI['en'][key] || key; }

function applyLang() {
  document.documentElement.lang = currentLang;
  localStorage.setItem('lv-lang', currentLang);

  document.querySelectorAll('.lang-switch button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });

  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el) {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {

  });

  loadTerms();
  loadWanted();
  if (document.getElementById('graphView').style.display !== 'none') {
    loadGraph();
  }
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildCardMeta(edges) {
  var parts = [];
  for (var i = 0; i < edges.length; i++) {
    var edge = edges[i];
    if (edge.direction === 'incoming') continue;
    if (edge.type === 'emerges_from') continue;
    var label = edge.type === 'displaces' ? t('edge_displaces')
              : edge.type === 'performs_pattern' ? t('edge_pattern')
              : edge.type === 'related_to' ? t('edge_related')
              : edge.type.toUpperCase();
    var target = edge.target_freetext || (edge.target && edge.target.label) || '';
    if (target) parts.push(label + ' \u2192 ' + target);
  }
  return parts.join(' \u00B7 ');
}

function getCommunityLabel(edges) {
  for (var i = 0; i < edges.length; i++) {
    if (edges[i].type === 'emerges_from' && edges[i].target) {
      return edges[i].target.label;
    }
  }
  return '';
}

async function loadTerms() {
  var grid = document.getElementById('grid');
  try {
    var resp = await fetch('/liminal-vocab/api/terms?lang=' + currentLang);
    if (!resp.ok) throw new Error('API error');
    var terms = await resp.json();

    grid.innerHTML = '';
    for (var i = 0; i < terms.length; i++) {
      var term = terms[i];
      var community = getCommunityLabel(term.edges || []);
      var meta = buildCardMeta(term.edges || []);
      var label = term.label || term.id;
      var maturity = term.maturity || {};
      var maturityStage = maturity.stage || '';

      var card = document.createElement('div');
      card.className = 'card';

      var html =
        '<div class="card-type"><span>' + escapeHtml(community) + '</span></div>' +
        '<div class="card-term">' + escapeHtml(label) + '</div>' +
        '<div class="card-makes-visible">' + escapeHtml(term.makes_visible || '') + '</div>';

      if (maturityStage) {
        var matKey = MATURITY_KEYS[maturityStage] || maturityStage;
        html += '<div class="card-maturity">' + escapeHtml(t(matKey)) + '</div>';
      }

      if (!term.has_equivalent) {
        var otherLang = currentLang === 'en' ? 'de' : 'en';
        html += '<div class="card-no-equiv">' + t('no_equivalent').replace('{lang}', LANG_NAMES[otherLang] || otherLang) + '</div>';
      }

      if (meta) {
        html += '<div class="card-meta">' + escapeHtml(meta) + '</div>';
      }

      card.innerHTML = html;
      grid.appendChild(card);
    }
  } catch (err) {
    grid.innerHTML = '<div class="card"><div class="card-term">Error</div><div class="card-makes-visible">' + escapeHtml(err.message) + '</div></div>';
  }
}

var graphSimulation = null;
var graphVisibleLayers = { Term: true, Community: true, Pattern: true, Wanted: true, labels: true };

// Layer toggle controls
document.querySelectorAll('.graph-toggle[data-layer]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var layer = btn.dataset.layer;
    graphVisibleLayers[layer] = !graphVisibleLayers[layer];
    btn.classList.toggle('active', graphVisibleLayers[layer]);
    updateGraphVisibility();
  });
});

function updateGraphVisibility() {
  var svg = document.querySelector('#graphContainer svg');
  if (!svg) return;

  d3.selectAll('.graph-node').each(function(d) {
    var ntype = d.type || 'Term';
    var visible = graphVisibleLayers[ntype] !== false;
    d3.select(this).style('opacity', visible ? 1 : 0.07);
  });

  d3.selectAll('.graph-label').each(function(d) {
    var ntype = d.type || 'Term';
    var layerVisible = graphVisibleLayers[ntype] !== false;
    var labelsOn = graphVisibleLayers.labels !== false;
    d3.select(this).style('opacity', (layerVisible && labelsOn) ? 1 : 0);
  });

  d3.selectAll('.graph-link').style('opacity', function(d) {
    var sType = (d.source.type || 'Term');
    var tType = (d.target.type || 'Term');
    return (graphVisibleLayers[sType] !== false && graphVisibleLayers[tType] !== false) ? 0.6 : 0.04;
  });
}

function toggleGraphFullscreen() {

var TYPE_COLORS = {
  Term: function() { return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); },
  Community: function() { return getComputedStyle(document.documentElement).getPropertyValue('--green').trim(); },
  Pattern: function() { return getComputedStyle(document.documentElement).getPropertyValue('--ink-faded').trim(); },
  Wanted: function() { return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); },
  Source: function() { return getComputedStyle(document.documentElement).getPropertyValue('--ink-faded').trim(); },
};

async function loadGraph() {
  var container = document.getElementById('graphContainer');
  var tooltip = document.getElementById('graphTooltip');
  var tooltipType = document.getElementById('graphTooltipType');
  var tooltipLabel = document.getElementById('graphTooltipLabel');

  var oldSvg = container.querySelector('svg');
  if (oldSvg) oldSvg.remove();

  if (graphSimulation) {
    graphSimulation.stop();
    graphSimulation = null;
  }

  var width = container.clientWidth;
  var height = container.clientHeight;

  var style = getComputedStyle(document.documentElement);
  var colorRule = style.getPropertyValue('--rule').trim();
  var colorInk = style.getPropertyValue('--ink').trim();
  var colorInkSoft = style.getPropertyValue('--ink-soft').trim();

  try {
    var resp = await fetch('/liminal-vocab/api/graph?lang=' + currentLang);
    if (!resp.ok) throw new Error('Graph API error');
    var data = await resp.json();

    var nodes = data.nodes || [];
    var edges = data.edges || [];

    var nodeMap = {};
    nodes.forEach(function(n) { nodeMap[n.id] = n; });

    var links = edges.map(function(e) {
      return { source: e.source, target: e.target, type: e.type };
    }).filter(function(l) {
      return nodeMap[l.source] && nodeMap[l.target];
    });

    var svg = d3.select(container)
      .append('svg')
      .attr('width', width)
      .attr('height', height);

    var g = svg.append('g');

    svg.call(d3.zoom()
      .scaleExtent([0.2, 5])
      .on('zoom', function(event) { g.attr('transform', event.transform); })
    );

    // Edges
    var link = g.selectAll('.graph-link')
      .data(links).enter().append('line')
      .attr('class', 'graph-link')
      .attr('stroke', colorInkSoft)
      .attr('stroke-opacity', 0.6)
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', function(d) { return d.type === 'related_to' ? '5,4' : 'none'; });

    // Node groups
    var node = g.selectAll('.graph-node')
      .data(nodes).enter().append('g')
      .attr('class', 'graph-node');

    // Draw shapes per type
    node.each(function(d) {
      var el = d3.select(this);
      var ntype = d.type || 'Term';
      var color = (TYPE_COLORS[ntype] || TYPE_COLORS.Term)();

      if (ntype === 'Wanted') {
        el.append('circle').attr('r', 8)
          .attr('fill', 'none').attr('stroke', color)
          .attr('stroke-width', 1.5).attr('stroke-dasharray', '3,2');
      } else if (ntype === 'Community') {
        el.append('circle').attr('r', 7).attr('fill', color).attr('opacity', 0.7);
      } else if (ntype === 'Pattern') {
        el.append('rect').attr('x', -5).attr('y', -5).attr('width', 10).attr('height', 10)
          .attr('fill', color).attr('opacity', 0.5).attr('rx', 2);
      } else if (ntype === 'Source') {
        el.append('circle').attr('r', 4).attr('fill', color).attr('opacity', 0.3);
      } else {
        var matScore = (d.maturity && d.maturity.score) || 0;
        el.append('circle').attr('r', 10 + matScore * 1.5).attr('fill', color).attr('opacity', 0.85);
      }
    });

    // Labels for ALL node types (always visible)
    var labels = g.selectAll('.graph-label')
      .data(nodes).enter().append('text')
      .attr('class', 'graph-label')
      .attr('font-family', '"JetBrains Mono", monospace')
      .attr('fill', colorInkSoft)
      .attr('dy', 3)
      .each(function(d) {
        var ntype = d.type || 'Term';
        var el = d3.select(this);
        if (ntype === 'Term') {
          el.attr('font-size', '11px').attr('font-weight', '500').attr('fill', colorInk);
          var r = 10 + ((d.maturity && d.maturity.score) || 0) * 1.5;
          el.attr('dx', r + 4);
        } else if (ntype === 'Community') {
          el.attr('font-size', '9px').attr('dx', 11);
        } else if (ntype === 'Pattern') {
          el.attr('font-size', '8px').attr('dx', 10).attr('font-style', 'italic');
        } else if (ntype === 'Wanted') {
          el.attr('font-size', '9px').attr('dx', 12).attr('font-style', 'italic');
        } else {
          el.attr('font-size', '8px').attr('dx', 8).style('opacity', 0.5);
        }
        el.text(d.label || d.id);
      });

    // Hover: highlight connections
    node.on('mouseover', function(event, d) {
      tooltipType.textContent = (d.type || 'Term').toUpperCase();
      tooltipLabel.textContent = d.label || d.id;
      tooltip.classList.add('visible');

      // Highlight connected edges
      var connectedIds = new Set([d.id]);
      link.each(function(l) {
        var sId = typeof l.source === 'object' ? l.source.id : l.source;
        var tId = typeof l.target === 'object' ? l.target.id : l.target;
        if (sId === d.id) connectedIds.add(tId);
        if (tId === d.id) connectedIds.add(sId);
      });
      link.attr('stroke-opacity', function(l) {
        var sId = typeof l.source === 'object' ? l.source.id : l.source;
        var tId = typeof l.target === 'object' ? l.target.id : l.target;
        return (sId === d.id || tId === d.id) ? 1 : 0.06;
      }).attr('stroke-width', function(l) {
        var sId = typeof l.source === 'object' ? l.source.id : l.source;
        var tId = typeof l.target === 'object' ? l.target.id : l.target;
        return (sId === d.id || tId === d.id) ? 2.5 : 1;
      });
      node.style('opacity', function(n) { return connectedIds.has(n.id) ? 1 : 0.15; });
      labels.style('opacity', function(n) { return connectedIds.has(n.id) ? 1 : 0.1; });
    }).on('mousemove', function(event) {
      var rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 10) + 'px';
    }).on('mouseout', function() {
      tooltip.classList.remove('visible');
      link.attr('stroke-opacity', 0.6).attr('stroke-width', 1.5);
      node.style('opacity', 1);
      labels.style('opacity', 1);
      updateGraphVisibility();
    });

    // Drag
    node.call(d3.drag()
      .on('start', function(event, d) {
        if (!event.active) graphSimulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', function(event, d) { d.fx = event.x; d.fy = event.y; })
      .on('end', function(event, d) {
        if (!event.active) graphSimulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

    // Simulation
    graphSimulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(100))
      .force('charge', d3.forceManyBody().strength(-180))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(function(d) {
        if (d.type === 'Term') return 14 + ((d.maturity && d.maturity.score) || 0) * 1.5;
        return 12;
      }))
      .on('tick', function() {
        link.attr('x1', function(d) { return d.source.x; })
            .attr('y1', function(d) { return d.source.y; })
            .attr('x2', function(d) { return d.target.x; })
            .attr('y2', function(d) { return d.target.y; });
        node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
        labels.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y; });
      });

    updateGraphVisibility();

  } catch (err) {
    container.innerHTML = '<div style="padding:24px;color:var(--ink-faded);font-family:JetBrains Mono,monospace;font-size:12px">' + escapeHtml(err.message) + '</div>';
  }
}

      grid.appendChild(card);
    }
  } catch (err) {
    grid.innerHTML = '';
  }
}

// Term proposal form
var proposalForm = document.getElementById('proposalForm');
var proposalResult = document.getElementById('formResult');

proposalForm.addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = proposalForm.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '...';
  proposalResult.className = 'form-result';
  proposalResult.style.display = 'none';

  var data = {
    term: proposalForm.term.value.trim(),
    community: proposalForm.community.value.trim(),
    makes_visible: proposalForm.makes_visible.value.trim(),
    pattern: proposalForm.pattern.value.trim(),
    citation: proposalForm.citation.value.trim(),
    context: proposalForm.context.value.trim(),
    submitter_name: proposalForm.submitter_name.value.trim(),
  };

  try {
    var resp = await fetch('/liminal-vocab/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      var errData = await resp.json().catch(function() { return {}; });
      throw new Error(errData.detail || 'Submission failed');
    }
    var res = await resp.json();
    proposalResult.className = 'form-result success';
    proposalResult.innerHTML = t('submit_success').replace('{term}', escapeHtml(data.term)).replace('{url}', res.issue_url).replace('{num}', res.issue_number);
    proposalResult.style.display = 'block';
    proposalForm.reset();
  } catch (err) {
    proposalResult.className = 'form-result error';
    proposalResult.textContent = t('submit_error').replace('{err}', err.message);
    proposalResult.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = t('form_submit_btn');
  }
});

// Wanted / gap forms (both the explore-page one and the contribute-page one)
function setupWantedForm(formId, resultId) {
  var form = document.getElementById(formId);
  var result = document.getElementById(resultId);

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = form.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = '...';
    result.className = 'form-result';
    result.style.display = 'none';

    var tagsRaw = form.tags ? form.tags.value.trim() : '';
    var tags = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];

    var data = {
      description: form.description.value.trim(),
      tags: tags,
      submitter_name: form.submitter_name ? form.submitter_name.value.trim() : '',
    };

    try {
      var resp = await fetch('/liminal-vocab/api/wanted/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!resp.ok) {
        var errData = await resp.json().catch(function() { return {}; });
        throw new Error(errData.detail || 'Submission failed');
      }
      await resp.json();
      result.className = 'form-result success';
      result.textContent = t('wanted_success');
      result.style.display = 'block';
      form.reset();
      loadWanted();
    } catch (err) {
      result.className = 'form-result error';
      result.textContent = t('wanted_error').replace('{err}', err.message);
      result.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = t('gaps_submit_btn');
    }
  });
}

setupWantedForm('wantedFormExplore', 'wantedFormExploreResult');
setupWantedForm('wantedFormContribute', 'wantedFormContributeResult');

// ================================================================
// 11. Reveal animations (IntersectionObserver)
// ================================================================

var observerInstance = null;

function initReveals() {
  if (observerInstance) {
    observerInstance.disconnect();
  }

  observerInstance = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        observerInstance.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal:not(.in)').forEach(function(r) {
    observerInstance.observe(r);
  });

  // Hero reveals immediately
  var heroReveals = document.querySelectorAll('#page-explore header.hero .reveal');
  heroReveals.forEach(function(el, i) {
    setTimeout(function() { el.classList.add('in'); }, 120 + i * 180);
  });
}

// ================================================================
// 12. Init
// ================================================================

initFromHash();
applyLang();
initReveals();
</script>
