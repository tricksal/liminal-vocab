<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liminal Vocab: A Verbal Cartography of Liminal Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --paper-deep: #ebe4d6;
    --ink: #1a1a1a;
    --ink-soft: #5a5754;
    --ink-faded: #8a8680;
    --accent: #b8391a;
    --rule: #d9d2c2;
    --green: #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Newsreader", Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 380;
    font-size: 19px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .wrap { max-width: 720px; margin: 0 auto; padding: 0 32px; }
  .wide { max-width: 960px; margin: 0 auto; padding: 0 32px; }

  header.hero { padding: 140px 0 120px; border-bottom: 1px solid var(--rule); }

  .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-faded); margin-bottom: 48px;
    display: flex; gap: 24px; align-items: center;
  }
  .eyebrow::before { content: ""; width: 32px; height: 1px; background: var(--ink-faded); }

  .lang-switch {
    margin-left: auto;
    display: flex; gap: 4px;
  }
  .lang-switch button {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; background: transparent;
    border: 1px solid var(--rule); color: var(--ink-faded);
    cursor: pointer; transition: all 0.25s ease; border-radius: 2px;
  }
  .lang-switch button:hover { border-color: var(--ink); color: var(--ink); }
  .lang-switch button.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 144, "SOFT" 30;
    font-weight: 340; font-size: clamp(44px, 7vw, 88px);
    line-height: 0.98; letter-spacing: -0.02em; margin-bottom: 56px;
  }
  h1 em { font-style: italic; font-variation-settings: "opsz" 144, "SOFT" 80; color: var(--accent); }

  .lede { font-size: 22px; line-height: 1.55; color: var(--ink-soft); max-width: 580px; font-weight: 360; }

  section { padding: 110px 0; border-bottom: 1px solid var(--rule); }

  .section-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-faded); margin-bottom: 40px;
  }

  h2 {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 50;
    font-weight: 360; font-size: clamp(32px, 4vw, 44px);
    line-height: 1.1; letter-spacing: -0.015em;
    margin-bottom: 36px; max-width: 560px;
  }
  h2 em { font-style: italic; color: var(--accent); }

  p { margin-bottom: 22px; max-width: 620px; }
  p + p { margin-top: -4px; }

  .pull {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 60;
    font-style: italic; font-weight: 340; font-size: 26px; line-height: 1.35;
    color: var(--ink); padding: 32px 0 32px 28px;
    border-left: 2px solid var(--accent); margin: 48px 0; max-width: 600px;
  }
  .pull cite {
    display: block; margin-top: 16px;
    font-family: "JetBrains Mono", monospace;
    font-style: normal; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-faded);
  }

  .explorer-intro { margin-bottom: 56px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px; background: var(--rule); border: 1px solid var(--rule);
  }

  .card {
    background: var(--paper); padding: 28px 26px 30px;
    transition: background 0.3s ease; cursor: default;
    display: flex; flex-direction: column; min-height: 220px;
  }
  .card:hover { background: var(--paper-deep); }

  .card-type {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-faded); margin-bottom: 14px;
  }
  .card-type span { color: var(--accent); font-weight: 500; }

  .card-term {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 72, "SOFT" 40;
    font-weight: 400; font-size: 28px; line-height: 1.1;
    letter-spacing: -0.01em; margin-bottom: 16px;
  }

  .card-makes-visible {
    font-size: 15px; line-height: 1.5; color: var(--ink-soft);
    font-style: italic; margin-bottom: auto; padding-bottom: 18px;
  }

  .card-meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.06em; color: var(--ink-faded);
    padding-top: 14px; border-top: 1px dashed var(--rule);
  }

  .card-no-equiv {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 0.06em; color: var(--accent);
    margin-top: 6px; opacity: 0.7;
  }

  .explorer-note {
    margin-top: 36px; font-size: 14px; color: var(--ink-faded);
    font-style: italic; max-width: 580px;
  }

  .method-steps { margin-top: 48px; display: grid; gap: 48px; max-width: 640px; }
  .step { display: grid; grid-template-columns: 60px 1fr; gap: 24px; align-items: start; }
  .step-num { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--accent); padding-top: 8px; }
  .step-body h3 { font-family: "Fraunces", Georgia, serif; font-variation-settings: "opsz" 48; font-weight: 420; font-size: 22px; margin-bottom: 10px; letter-spacing: -0.01em; }
  .step-body p { font-size: 17px; color: var(--ink-soft); margin-bottom: 0; }

  .principles { margin-top: 48px; display: grid; gap: 0; max-width: 640px; }
  .principle { padding: 28px 0; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 32px 1fr; gap: 20px; align-items: baseline; }
  .principle:last-child { border-bottom: none; }
  .principle-num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-faded); }
  .principle-text { font-family: "Fraunces", Georgia, serif; font-variation-settings: "opsz" 48, "SOFT" 40; font-weight: 380; font-size: 19px; line-height: 1.4; }
  .principle-text strong { font-weight: 520; font-style: italic; color: var(--accent); }

  .submit-intro { margin-bottom: 48px; }
  .submit-form { max-width: 640px; }
  .form-group { margin-bottom: 32px; }
  .form-group label { display: block; font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; }
  .form-group label .required { color: var(--accent); }
  .form-group .hint { display: block; font-family: "Newsreader", Georgia, serif; font-size: 14px; font-style: italic; color: var(--ink-faded); margin-bottom: 10px; text-transform: none; letter-spacing: normal; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; font-family: "Newsreader", Georgia, serif; font-size: 17px; line-height: 1.5; color: var(--ink); background: var(--paper); border: 1px solid var(--rule); border-radius: 2px; transition: border-color 0.25s ease; -webkit-appearance: none; appearance: none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: var(--ink); }
  .form-group textarea { min-height: 120px; resize: vertical; }

  .submit-btn { font-family: "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 40px; background: var(--ink); border: 1px solid var(--ink); color: var(--paper); cursor: pointer; transition: all 0.25s ease; border-radius: 2px; }
  .submit-btn:hover { background: var(--accent); border-color: var(--accent); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .form-result { margin-top: 24px; padding: 20px 24px; border-radius: 2px; font-size: 16px; display: none; }
  .form-result.success { display: block; background: #e8f5e9; border: 1px solid var(--green); color: var(--green); }
  .form-result.error { display: block; background: #fbe9e7; border: 1px solid var(--accent); color: var(--accent); }
  .form-result a { color: inherit; font-weight: 500; }

  .or-github { margin-top: 32px; padding-top: 24px; border-top: 1px dashed var(--rule); font-size: 15px; color: var(--ink-faded); }
  .or-github a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; transition: color 0.2s; }
  .or-github a:hover { color: var(--accent); }

  footer { padding: 100px 0 80px; }
  footer p { font-size: 15px; color: var(--ink-soft); max-width: 560px; margin-bottom: 16px; }
  footer a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 1px; transition: color 0.2s; }
  footer a:hover { color: var(--accent); }
  .footer-meta { margin-top: 56px; padding-top: 32px; border-top: 1px solid var(--rule); font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.06em; color: var(--ink-faded); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

  .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .wrap, .wide { padding: 0 24px; }
    header.hero { padding: 90px 0 80px; }
    section { padding: 80px 0; }
    .grid { grid-template-columns: 1fr; }
    .step { grid-template-columns: 1fr; gap: 8px; }
    body { font-size: 17px; }
  }

  ::selection { background: var(--accent); color: var(--paper); }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <div class="eyebrow reveal">
      <span>Liminal Vocab · April 2026</span>
      <div class="lang-switch">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="de">DE</button>
      </div>
    </div>
    <h1 class="reveal" data-i18n="hero_title"></h1>
    <p class="lede reveal" data-i18n="hero_lede"></p>
  </div>
</header>

<section>
  <div class="wrap">
    <div class="section-label reveal" data-i18n="situation_label"></div>
    <h2 class="reveal" data-i18n="situation_title"></h2>
    <p class="reveal" data-i18n="situation_p1"></p>
    <p class="reveal" data-i18n="situation_p2"></p>
    <div class="pull reveal">
      <span data-i18n="situation_quote"></span>
      <cite>Kinsey Carlson, <a href="https://open.substack.com/pub/inthemaking/p/everythings-changing-and-we-dont" style="color:inherit">"Everything's changing and we don't have the words"</a></cite>
    </div>
    <p class="reveal" data-i18n="situation_p3"></p>
  </div>
</section>

<section>
  <div class="wide">
    <div class="section-label reveal" data-i18n="proposal_label"></div>
    <h2 class="reveal" data-i18n="proposal_title"></h2>
    <div class="explorer-intro reveal">
      <p data-i18n="proposal_intro"></p>
    </div>
    <div class="grid reveal" id="grid"></div>
    <p class="explorer-note reveal" data-i18n="proposal_note"></p>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="section-label reveal" data-i18n="method_label"></div>
    <h2 class="reveal" data-i18n="method_title"></h2>
    <p class="reveal" data-i18n="method_intro"></p>
    <div class="method-steps">
      <div class="step reveal"><div class="step-num">01</div><div class="step-body"><h3 data-i18n="method_01_title"></h3><p data-i18n="method_01_text"></p></div></div>
      <div class="step reveal"><div class="step-num">02</div><div class="step-body"><h3 data-i18n="method_02_title"></h3><p data-i18n="method_02_text"></p></div></div>
      <div class="step reveal"><div class="step-num">03</div><div class="step-body"><h3 data-i18n="method_03_title"></h3><p data-i18n="method_03_text"></p></div></div>
      <div class="step reveal"><div class="step-num">04</div><div class="step-body"><h3 data-i18n="method_04_title"></h3><p data-i18n="method_04_text"></p></div></div>
    </div>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="section-label reveal" data-i18n="principles_label"></div>
    <h2 class="reveal" data-i18n="principles_title"></h2>
    <div class="principles">
      <div class="principle reveal"><div class="principle-num">01</div><div class="principle-text" data-i18n="principle_01"></div></div>
      <div class="principle reveal"><div class="principle-num">02</div><div class="principle-text" data-i18n="principle_02"></div></div>
      <div class="principle reveal"><div class="principle-num">03</div><div class="principle-text" data-i18n="principle_03"></div></div>
      <div class="principle reveal"><div class="principle-num">04</div><div class="principle-text" data-i18n="principle_04"></div></div>
      <div class="principle reveal"><div class="principle-num">05</div><div class="principle-text" data-i18n="principle_05"></div></div>
      <div class="principle reveal"><div class="principle-num">06</div><div class="principle-text" data-i18n="principle_06"></div></div>
    </div>
  </div>
</section>

<section id="submit">
  <div class="wrap">
    <div class="section-label reveal" data-i18n="submit_label"></div>
    <h2 class="reveal" data-i18n="submit_title"></h2>
    <div class="submit-intro reveal">
      <p data-i18n="submit_intro_1"></p>
      <p data-i18n="submit_intro_2"></p>
    </div>
    <form class="submit-form reveal" id="proposalForm">
      <div class="form-group">
        <label data-i18n="form_term_label"></label>
        <input type="text" name="term" required data-i18n-placeholder="form_term_placeholder">
      </div>
      <div class="form-group">
        <label data-i18n="form_community_label"></label>
        <span class="hint" data-i18n="form_community_hint"></span>
        <input type="text" name="community" required data-i18n-placeholder="form_community_placeholder">
      </div>
      <div class="form-group">
        <label data-i18n="form_visible_label"></label>
        <span class="hint" data-i18n="form_visible_hint"></span>
        <textarea name="makes_visible" required data-i18n-placeholder="form_visible_placeholder"></textarea>
      </div>
      <div class="form-group">
        <label data-i18n="form_pattern_label"></label>
        <span class="hint" data-i18n="form_pattern_hint"></span>
        <input type="text" name="pattern" data-i18n-placeholder="form_pattern_placeholder">
      </div>
      <div class="form-group">
        <label data-i18n="form_citation_label"></label>
        <span class="hint" data-i18n="form_citation_hint"></span>
        <textarea name="citation" required data-i18n-placeholder="form_citation_placeholder"></textarea>
      </div>
      <div class="form-group">
        <label data-i18n="form_context_label"></label>
        <span class="hint" data-i18n="form_context_hint"></span>
        <textarea name="context" data-i18n-placeholder="form_context_placeholder"></textarea>
      </div>
      <div class="form-group">
        <label data-i18n="form_name_label"></label>
        <span class="hint" data-i18n="form_name_hint"></span>
        <input type="text" name="submitter_name" data-i18n-placeholder="form_name_placeholder">
      </div>
      <button type="submit" class="submit-btn" data-i18n="form_submit_btn"></button>
      <div class="form-result" id="formResult"></div>
      <div class="or-github reveal" data-i18n-html="form_or_github"></div>
    </form>
  </div>
</section>

<footer id="credit">
  <div class="wrap">
    <p data-i18n-html="footer_credit"></p>
    <p data-i18n="footer_early"></p>
    <p>Source: <a href="https://github.com/tricksal/liminal-vocab">GitHub</a></p>
    <div class="footer-meta">
      <span>STATUS · V 0.2 · OPEN FOR PROPOSALS</span>
      <span>APRIL 2026</span>
    </div>
  </div>
</footer>

const LANG_NAMES = { en: 'englisches', de: 'deutsches' };

let currentLang = localStorage.getItem('lv-lang') || 'en';

function t(key) { return UI[currentLang][key] || UI['en'][key] || key; }

function applyLang() {
  document.documentElement.lang = currentLang;
  localStorage.setItem('lv-lang', currentLang);

  // Update lang switch buttons
  document.querySelectorAll('.lang-switch button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === currentLang);
  });

  // Apply i18n text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });

  loadTerms();
}

// Language switch
document.querySelectorAll('.lang-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    applyLang();
  });
});


// ── Load terms from API ──────────────────────────────────

function buildCardMeta(edges) {
  const parts = [];
  for (const edge of edges) {
    if (edge.direction === 'incoming') continue;
    if (edge.type === 'emerges_from') continue;
    const label = edge.type === 'displaces' ? t('edge_displaces')
                : edge.type === 'performs_pattern' ? t('edge_pattern')
                : edge.type === 'related_to' ? t('edge_related')
                : edge.type.toUpperCase();
    const target = edge.target_freetext || (edge.target && edge.target.label) || '';
    if (target) parts.push(label + ' \u2192 ' + target);
  }
  return parts.join(' \u00B7 ');
}

function getCommunityLabel(edges) {
  const e = edges.find(e => e.type === 'emerges_from' && e.target);
  return e ? e.target.label : '';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadTerms() {
  const grid = document.getElementById('grid');
  try {
    const resp = await fetch('/liminal-vocab/api/terms?lang=' + currentLang);
    if (!resp.ok) throw new Error('API error');
    const terms = await resp.json();

    grid.innerHTML = '';
    for (const term of terms) {
      const community = getCommunityLabel(term.edges || []);
      const meta = buildCardMeta(term.edges || []);
      const label = term.label || term.id;
      const originalLabel = term.original_label || label;
      const showOriginal = !term.has_equivalent && label === originalLabel;

      const card = document.createElement('div');
      card.className = 'card';

      let html =
        '<div class="card-type"><span>' + escapeHtml(community) + '</span></div>' +
        '<div class="card-term">' + escapeHtml(label) + '</div>' +
        '<div class="card-makes-visible">' + escapeHtml(term.makes_visible || '') + '</div>';

      if (!term.has_equivalent) {
        const otherLang = currentLang === 'en' ? 'de' : 'en';
        html += '<div class="card-no-equiv">' + t('no_equivalent').replace('{lang}', LANG_NAMES[otherLang] || otherLang) + '</div>';
      }

      if (meta) {
        html += '<div class="card-meta">' + escapeHtml(meta) + '</div>';
      }

      card.innerHTML = html;
      grid.appendChild(card);
    }
  } catch (err) {
    grid.innerHTML = '<div class="card"><div class="card-term">Error</div><div class="card-makes-visible">' + escapeHtml(err.message) + '</div></div>';
  }
}


// ── Reveal on scroll ──────────────────────────────────

const reveals = document.querySelectorAll('.reveal');
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      io.unobserve(e.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
reveals.forEach(r => io.observe(r));

window.addEventListener('load', () => {
  document.querySelectorAll('header.hero .reveal').forEach((el, i) => {
    setTimeout(() => el.classList.add('in'), 120 + i * 180);
  });
});


// ── Form submission ──────────────────────────────────

const form = document.getElementById('proposalForm');
const result = document.getElementById('formResult');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = form.querySelector('.submit-btn');
  btn.disabled = true;
  btn.textContent = '...';
  result.className = 'form-result';
  result.style.display = 'none';

  const data = {
    term: form.term.value.trim(),
    community: form.community.value.trim(),
    makes_visible: form.makes_visible.value.trim(),
    pattern: form.pattern.value.trim(),
    citation: form.citation.value.trim(),
    context: form.context.value.trim(),
    submitter_name: form.submitter_name.value.trim(),
  };

  try {
    const resp = await fetch('/liminal-vocab/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || 'Submission failed');
    }
    const res = await resp.json();
    result.className = 'form-result success';
    result.innerHTML = t('submit_success').replace('{term}', escapeHtml(data.term)).replace('{url}', res.issue_url).replace('{num}', res.issue_number);
    result.style.display = 'block';
    form.reset();
  } catch (err) {
    result.className = 'form-result error';
    result.textContent = t('submit_error').replace('{err}', err.message);
    result.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = t('form_submit_btn');
  }
});


// ── Init ──────────────────────────────────

applyLang();
</script>
